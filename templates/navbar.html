<nav
  x-data="{ 
    mobileOpen: false,
    profileDropdownOpen: false,
    isAdmin: {% if user %}true{% else %}false{% endif %}, 
    hasGuild: {% if servers %}true{% else %}false{% endif %} 
  }"
  @click.away="profileDropdownOpen = false; mobileOpen = false;"
  class="sticky top-4 z-50 px-4 w-full"
>
  <div
    class="max-w-7xl mx-auto backdrop-blur-xl bg-white/[0.03] rounded-2xl px-5 py-2.5 border border-white/10 shadow-xl"
  >
    <div class="flex items-center justify-between h-14">
      <a
        href="{% url 'core:homepage' %}"
        class="flex items-center gap-3 px-1 shrink-0"
      >
        <div
          class="w-9 h-9 rounded-lg bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center font-bold text-sm text-white border border-white/10 shadow-md"
        >
          DV
        </div>
        <div class="hidden sm:block">
          <h1 class="font-black text-xs tracking-widest text-slate-200">
            DV DASHBOARD
          </h1>
        </div>
      </a>

      <div class="hidden lg:flex items-center gap-8 h-full">
        <a
          href="{% url 'core:homepage' %}"
          class="relative flex items-center gap-2.5 text-sm font-semibold text-white transition-colors duration-200 group"
        >
          <i class="ri-dashboard-line text-base text-cyan-400"></i>
          <span>Dashboard</span>
          <span
            class="absolute -bottom-5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-lg shadow-cyan-400"
          ></span>
        </a>

        {% if user %}
        <template x-if="hasGuild">
          <a
            href="#"
            class="relative flex items-center gap-2.5 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors duration-200"
          >
            <i class="ri-community-line text-base"></i>
            <span>Guilds</span>
          </a>
        </template>

        <template x-if="isAdmin">
          <a
            href="#"
            class="relative flex items-center gap-2.5 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors duration-200"
          >
            <i class="ri-shield-check-line text-base"></i>
            <span>Moderation</span>
          </a>
        </template>

        <template x-if="hasGuild">
          <a
            href="#"
            class="relative flex items-center gap-2.5 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors duration-200"
          >
            <i class="ri-ticket-2-line text-base"></i>
            <span>Tickets</span>
          </a>
        </template>

        <template x-if="isAdmin">
          <a
            href="#"
            class="relative flex items-center gap-2.5 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors duration-200"
          >
            <i class="ri-bar-chart-box-line text-base"></i>
            <span>Analytics</span>
          </a>
        </template>
        {% endif %}
      </div>

      <div class="flex items-center gap-3 shrink-0">
        {% if user %}
        <div class="relative">
          <button
            @click="profileDropdownOpen = !profileDropdownOpen"
            class="flex items-center gap-3 p-1 rounded-xl hover:bg-white/[0.04] border border-transparent hover:border-white/5 transition-all focus:outline-none group"
          >
            <div class="hidden md:block text-right select-none">
              <p
                class="text-sm font-bold text-slate-200 leading-tight group-hover:text-white transition-colors"
              >
                {{ user.global_name|default:user.username }}
              </p>
              <p
                class="text-[10px] font-semibold text-slate-500 tracking-wide uppercase mt-0.5"
              >
                Operator Node
              </p>
            </div>

            {% if user.avatar %}
            <img
              src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png"
              alt="User Profile Image"
              class="w-9 h-9 rounded-xl border border-white/10 object-cover shadow-sm"
            />
            {% else %}
            <div
              class="w-9 h-9 rounded-xl bg-slate-800 border border-white/10 flex items-center justify-center text-xs font-bold text-slate-300 shadow-inner"
            >
              {{ user.username|slice:":2"|upper }}
            </div>
            {% endif %}
            <i
              class="ri-arrow-down-s-line text-slate-500 text-sm transition-transform duration-200"
              :class="{'rotate-180 text-slate-300': profileDropdownOpen}"
            ></i>
          </button>

          <div
            x-show="profileDropdownOpen"
            x-cloak
            x-transition:enter="transition ease-out duration-100"
            x-transition:enter-start="opacity-0 scale-95 translate-y-1"
            x-transition:enter-end="opacity-100 scale-100 translate-y-0"
            x-transition:leave="transition ease-in duration-75"
            x-transition:leave-start="opacity-100 scale-100 translate-y-0"
            x-transition:leave-end="opacity-0 scale-95 translate-y-1"
            class="absolute right-0 mt-2 w-52 rounded-xl border border-white/10 bg-slate-900/95 backdrop-blur-2xl p-1.5 shadow-2xl z-50 overflow-hidden text-left"
          >
            <div class="px-3 py-2 border-b border-white/5 md:hidden mb-1">
              <p class="text-xs font-bold text-slate-300 truncate">
                {{ user.global_name|default:user.username }}
              </p>
              <p class="text-[10px] text-slate-500">ID: {{ user.id }}</p>
            </div>

            <a
              href="#"
              class="flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-slate-400 hover:text-slate-200 rounded-lg hover:bg-white/5 transition-colors"
            >
              <i class="ri-user-settings-line text-sm text-slate-400"></i>
              <span>Profile Parameters</span>
            </a>
            <a
              href="#"
              class="flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-slate-400 hover:text-slate-200 rounded-lg hover:bg-white/5 transition-colors"
            >
              <i class="ri-equalizer-line text-sm text-slate-400"></i>
              <span>Global Preferences</span>
            </a>

            <div class="h-px bg-white/5 my-1.5"></div>

            <a
              href="{% url 'core:discord_logout' %}"
              class="flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg transition-all group"
            >
              <i
                class="ri-logout-box-r-line text-sm text-red-400 group-hover:translate-x-0.5 transition-transform"
              ></i>
              <span>Logout</span>
            </a>
          </div>
        </div>

        {% else %}
        <a
          href="{% url 'core:discord_login' %}"
          class="flex items-center gap-2 px-4 py-2 text-xs font-bold text-slate-300 border border-white/10 rounded-xl transition-all hover:text-white hover:bg-white/5 shadow-sm active:scale-95"
        >
          <i class="ri-discord-fill text-sm text-cyan-400"></i>
          <span>Login with Discord</span>
        </a>
        {% endif %}

        <button
          @click="mobileOpen = !mobileOpen"
          class="lg:hidden p-2 text-slate-400 hover:text-slate-200 transition-colors focus:outline-none rounded-xl hover:bg-white/5 border border-transparent active:border-white/5"
        >
          <i class="ri-menu-4-line text-xl" x-show="!mobileOpen"></i>
          <i class="ri-close-line text-xl" x-show="mobileOpen" x-cloak></i>
        </button>
      </div>
    </div>

    <div
      x-show="mobileOpen"
      x-cloak
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 -translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-100"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 -translate-y-2"
      class="lg:hidden mt-2 pt-3 border-t border-white/5 pb-2"
    >
      <div class="grid grid-cols-2 gap-y-3 gap-x-4 px-2 py-1">
        <a
          href="{% url 'core:homepage' %}"
          class="flex items-center gap-2 px-2 py-1.5 text-sm text-white font-bold rounded-lg bg-white/5"
        >
          <i class="ri-dashboard-line text-base text-cyan-400"></i>
          <span>Dashboard</span>
        </a>

        {% if user %}
        <template x-if="hasGuild">
          <a
            href="#"
            class="flex items-center gap-2 px-2 py-1.5 text-sm text-slate-400 hover:text-slate-200 font-semibold rounded-lg hover:bg-white/[0.02] transition-colors"
          >
            <i class="ri-community-line text-base"></i>
            <span>Guilds</span>
          </a>
        </template>

        <template x-if="isAdmin">
          <a
            href="#"
            class="flex items-center gap-2 px-2 py-1.5 text-sm text-slate-400 hover:text-slate-200 font-semibold rounded-lg hover:bg-white/[0.02] transition-colors"
          >
            <i class="ri-shield-check-line text-base"></i>
            <span>Moderation</span>
          </a>
        </template>

        <template x-if="hasGuild">
          <a
            href="#"
            class="flex items-center gap-2 px-2 py-1.5 text-sm text-slate-400 hover:text-slate-200 font-semibold rounded-lg hover:bg-white/[0.02] transition-colors"
          >
            <i class="ri-ticket-2-line text-base"></i>
            <span>Tickets</span>
          </a>
        </template>

        <template x-if="isAdmin">
          <a
            href="#"
            class="flex items-center gap-2 px-2 py-1.5 text-sm text-slate-400 hover:text-slate-200 font-semibold rounded-lg hover:bg-white/[0.02] transition-colors"
          >
            <i class="ri-bar-chart-box-line text-base"></i>
            <span>Analytics</span>
          </a>
        </template>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
