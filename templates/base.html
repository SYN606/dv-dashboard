{% load static %}
<!doctype html>
<html lang="en" class="h-full scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DV Dashboard - Professional Discord Bot Management" />
    
    <title>{% block title %}DV Dashboard{% endblock %}</title>
    {% block favicons %}
    
    {% include "partials/_favicons.html" %}

    {% endblock favicons %}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { bg: "#0a0a0c", primary: "#22d3ee" },
            fontFamily: {
              sans: ["Manrope", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
          },
        },
      };
    </script>


    <link rel="stylesheet" href="{% static 'css/base.css' %}" />

    <style>
      [x-cloak] { display: none !important; }

      /* Hardware Accelerated Performance Smooth Cursor Ring */
      .cursor-follower {
        position: fixed;
        top: 0;
        left: 0;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.04) 0%, transparent 70%);
        pointer-events: none;
        z-index: 9999;
        will-change: transform;
        mix-blend-mode: screen;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
    </style>
  </head>

  <body class="min-h-screen flex flex-col bg-[#0a0a0c] text-slate-200 antialiased relative">
    
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,#0f172a_0%,#0a0a0c_70%)]"></div>
      <div class="absolute inset-0 opacity-[0.02]" style="background-image: radial-gradient(#22d3ee 1px, transparent 1px); background-size: 24px 24px;"></div>
    </div>

    <div class="cursor-follower" id="cursor"></div>

    {% include "navbar.html" %}
    {% include "partials/_messages.html" %}

    <main class="flex-1 relative z-10 fade-in">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        {% block body %}{% endblock %}
      </div>
    </main>

    {% include "footer.html" %}

    <script>
      const cursor = document.getElementById("cursor");
      let currentX = 0, currentY = 0;

      document.addEventListener("mousemove", (e) => {
        currentX = e.clientX - 150; 
        currentY = e.clientY - 150;
        requestAnimationFrame(() => {
          cursor.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        });
      });
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
      });
    </script>
  </body>
</html>
